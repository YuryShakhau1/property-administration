spring:
  application:
    name: property-administration

  profiles:
    include: db-h2-test

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: none
    show-sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  host: 127.0.0.1
  port: 8092