spring:
  application:
    name: property-administration

  profiles:
    include: ${DB_PROFILE:db-h2}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate.ddl-auto: none
    show-sql: false

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

